<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaGame!</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --background: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .lives { color: var(--danger); font-size: 1.2rem; }
        .score { color: var(--primary); font-size: 1.2rem; }

        .progress-bar {
            background-color: #e5e7eb;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .question {
            font-size: 1.25rem;
            margin-bottom: 25px;
            font-weight: 600;
            text-align: left;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-option {
            background-color: #fff;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: 500;
        }

        .btn-option:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .correct {
            background-color: #d1fae5 !important;
            border-color: var(--success) !important;
            color: #065f46;
        }

        .incorrect {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            line-height: 1.4;
            text-align: left;
        }

        .feedback.correct-bg { background-color: #e6f4ea; color: #137333; }
        .feedback.incorrect-bg { background-color: #fce8e6; color: #c5221f; }

        .btn-next {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }

        .btn-lang {
            background-color: #f3f4f6;
            border: 2px solid #d1d5db;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            font-size: 1rem;
        }
        .btn-lang:hover { background-color: #e5e7eb; }

        .screen { display: none; }
        .active { display: block; }
        
        .level-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
        }
        .level-card:not(.locked):hover {
            border-color: var(--primary);
            background: #eef2ff;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- PANTALLA SELECCIÓN IDIOMA -->
        <div id="lang-screen" class="screen active">
            <h1>📊 ContaGame!</h1>
            <p>Selecciona la teua llengua / Selecciona tu lengua:</p>
            <button class="btn-lang" onclick="setLanguage('ca')">Valencià 🌐</button>
            <button class="btn-lang" onclick="setLanguage('es')">Castellano 🌐</button>
        </div>

        <!-- PANTALLA MENÚ DE NIVELES -->
        <div id="menu-screen" class="screen">
            <h2 id="menu-title">Selecciona el Nivell</h2>
            <div id="levels-list"></div>
        </div>

        <!-- PANTALLA DE JUEGO -->
        <div id="game-screen" class="screen">
            <div class="header">
                <span class="score">⭐ <span id="txt-score">Punts</span>: <span id="score-val">0</span></span>
                <span class="lives" id="lives-display">❤️❤️❤️</span>
            </div>
            <div class="progress-bar"><div id="progress" class="progress"></div></div>
            <div id="level-indicator" style="color: #6b7280; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; font-weight: bold;"></div>
            <div class="question" id="question-text"></div>
            <div class="options-grid" id="options-container"></div>
            <div class="feedback" id="feedback-box"></div>
            <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">Següent / Siguiente 👉</button>
        </div>

        <!-- PANTALLA RESULTADO DEL NIVEL -->
        <div id="level-end-screen" class="screen">
            <h2 id="level-end-title">Nivell Finalitzat</h2>
            <p id="level-end-result" style="font-size: 1.2rem; margin: 20px 0;"></p>
            <button class="btn-next" id="level-end-btn" onclick="goToMenu()">Tornar al Menú 📋</button>
        </div>
    </div>

    <script>

                ]
            }
        };

        let currentLang = 'ca';
        let currentLevel = 1;
        let currentQuestionIndex = 0;
        let score = 0;
        let correctAnswersInLevel = 0;
        let lives = 3;
        
        // Estado de desbloqueo de niveles guardado localmente en sesión
        let unlockedLevels = [1];

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const texts = i18n[currentLang];
            document.getElementById('menu-title').innerText = texts.menuTitle;
            
            const list = document.getElementById('levels-list');
            list.innerHTML = '';

            for(let i = 1; i <= 3; i++) {
                const isUnlocked = unlockedLevels.includes(i);
                const card = document.createElement('div');
                card.className = `level-card ${isUnlocked ? '' : 'locked'}`;
                
                let lvlTxt = texts[`lvl${i}`];
                if(!isUnlocked) lvlTxt += ` 🔒 (${texts.locked})`;
                
                card.innerText = lvlTxt;
                if(isUnlocked) {
                    card.onclick = () => startLevel(i);
                }
                list.appendChild(card);
            }
        }

        function startLevel(lvl) {
            currentLevel = lvl;
            currentQuestionIndex = 0;
            correctAnswersInLevel = 0;
            score = 0;
            lives = 3;

            document.getElementById('score-val').innerText = score;
            document.getElementById('txt-score').innerText = i18n[currentLang].score;
            updateLivesDisplay();

            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const levelQuestions = dbQuestions[currentLang][currentLevel];
            const q = levelQuestions[currentQuestionIndex];
            
            document.getElementById('level-indicator').innerText = i18n[currentLang][`lvl${currentLevel}`] + ` (${currentQuestionIndex + 1}/10)`;
            document.getElementById('question-text').innerText = q.q;
            
            const percent = (currentQuestionIndex / levelQuestions.length) * 100;
            document.getElementById('progress').style.width = percent + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            q.o.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            const levelQuestions = dbQuestions[currentLang][currentLevel];
            const q = levelQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.btn-option');
            
            buttons.forEach(btn => btn.disabled = true);
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.style.display = 'block';

            if (selectedIndex === q.a) {
                selectedBtn.classList.add('correct');
                feedbackBox.innerText = q.f;
                feedbackBox.className = "feedback correct-bg";
                score += 10;
                correctAnswersInLevel++;
                document.getElementById('score-val').innerText = score;
            } else {
                selectedBtn.classList.add('incorrect');
                buttons[q.a].classList.add('correct');
                feedbackBox.innerText = q.f;
                feedbackBox.className = "feedback incorrect-bg";
                lives--;
                updateLivesDisplay();
            }

            document.getElementById('next-btn').innerText = i18n[currentLang].nextBtn;
            document.getElementById('next-btn').style.display = 'block';
        }

        function updateLivesDisplay() {
            let hearts = "";
            for(let i=0; i<3; i++) {
                hearts += i < lives ? "❤️" : "🖤";
            }
            document.getElementById('lives-display').innerText = hearts;

            if (lives <= 0) {
                setTimeout(endLevelScreen, 1000);
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            const levelQuestions = dbQuestions[currentLang][currentLevel];
            if (currentQuestionIndex < levelQuestions.length && lives > 0) {
                showQuestion();
            } else {
                endLevelScreen();
            }
        }

        function endLevelScreen() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('level-end-screen').classList.add('active');
            
            const title = document.getElementById('level-end-title');
            const resultText = document.getElementById('level-end-result');
            const btn = document.getElementById('level-end-btn');
            const texts = i18n[currentLang];

            btn.innerText = texts.backMenu;

            if (lives <= 0) {
                title.innerText = "Game Over 💀";
                resultText.innerText = texts.gameOver;
            } else {
                title.innerText = texts[`lvl${currentLevel}`];
                if (correctAnswersInLevel >= 5) {
                    resultText.innerText = texts.passed.replace("{correct}", correctAnswersInLevel);
                    // Desbloquear siguiente nivel si no estaba ya
                    if (currentLevel < 3 && !unlockedLevels.includes(currentLevel + 1)) {
                        unlockedLevels.push(currentLevel + 1);
                    }
                } else {
                    resultText.innerText = texts.failed.replace("{correct}", correctAnswersInLevel);
                }
            }
        }

        function goToMenu() {
            document.getElementById('level-end-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            renderMenu();
        }
    </script>
</body>
</html>
